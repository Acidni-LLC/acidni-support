# =============================================================================
# acidni-support CI/CD — Build, push to ACR, deploy to Container App
# =============================================================================
name: Deploy acidni-support

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: cracidnishared
  ACR_LOGIN: cracidnishared.azurecr.io
  IMAGE_NAME: acidni-support
  CONTAINER_APP: ca-acidni-support
  RESOURCE_GROUP: rg-dev-acidni-shared
  AZURE_SUBSCRIPTION: 4492e3a6-11b3-4a01-99d2-75c3b7e17577

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="dev-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.ACR_LOGIN }}/${{ env.IMAGE_NAME }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          docker build -t ${{ steps.tag.outputs.full_image }} .
          docker push ${{ steps.tag.outputs.full_image }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --subscription ${{ env.AZURE_SUBSCRIPTION }} \
            --image ${{ steps.tag.outputs.full_image }}

      - name: Verify health
        run: |
          sleep 15
          # Use container app FQDN (custom domain may not resolve from GH runners)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://ca-acidni-support.mangograss-1e4cf20f.eastus2.azurecontainerapps.io/health)
          echo "Health check: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Health check returned $HTTP_CODE"
          fi
